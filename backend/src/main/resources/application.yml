spring:
  application:
    name: saarthi-backend

  # Use H2 for development, switch to MySQL for production
  datasource:
    url: jdbc:h2:file:./data/saarthi_db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # Uncomment below for MySQL production
  # datasource:
  #   url: jdbc:mysql://localhost:3306/saarthi_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata
  #   driver-class-name: com.mysql.cj.jdbc.Driver
  #   username: root
  #   password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
        # For MySQL: org.hibernate.dialect.MySQLDialect

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

# JWT Configuration
jwt:
  secret: SaarthiAI2026SecretKeyForJWTTokenGenerationMustBe256BitsLong!!
  expiration: 86400000  # 24 hours in milliseconds

# AI Microservice
ai:
  service:
    url: http://localhost:8000

# CORS
cors:
  allowed-origins: http://localhost:3000,http://localhost:5173
